version: 1

databases:
  - name: spartanbank-db
    plan: free
    databaseName: spartanbank
    user: spartanbank

services:
  - type: web
    name: spartan-bank
    runtime: python
    plan: free
    region: frankfurt

    buildCommand: ./build.sh

    # Gunicorn command (works on Render Linux)
    startCommand: gunicorn spartan_bank.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spartanbank-db
          property: connectionString

      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,https://your-frontend.onrender.com"

      - key: EMAIL_HOST_USER
        value: "grandviewshopafrica@gmail.com"
      - key: ADMIN_EMAIL
        value: "grandviewshopafrica@gmail.com"

      - key: PYTHON_VERSION
        value: "3.12"
      - key: DJANGO_SETTINGS_MODULE
        value: "spartan_bank.settings"